[project]
name = "palacetoolkit-palace-cpu"
version = "0.1.0"
description = "Prebuilt Palace CPU binary for PalaceToolkit"
requires-python = ">=3.8"
license = {text = "BSD-3-Clause"}
classifiers = [
  "Programming Language :: Python :: 3",
  "Operating System :: POSIX :: Linux",
]

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["palacetoolkit_palace_cpu", "palacetoolkit_palace_cpu.*"]

[tool.setuptools.package-data]
palacetoolkit_palace_cpu = ["bin/*", "lib/*", "lib/**/*.so", "lib/**/*.so.*", "lib/**/*.dylib"]

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"
