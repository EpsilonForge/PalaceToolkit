name: Docs Doctest

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: docs-doctest-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  docs-doctest:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install sphinx pydata-sphinx-theme myst-parser myst-nb sphinx-copybutton sphinx-design linkify-it-py pytest

      - name: Run docs build doctest
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_docs_build.py