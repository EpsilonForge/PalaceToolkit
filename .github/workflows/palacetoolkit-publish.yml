name: Publish palace-toolkit

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built artifacts to PyPI"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-main-package:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build
          python -m build
          ls -lah dist

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: palace-toolkit-dist
          path: dist/*

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

  publish-pypi:
    needs: [build-main-package]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: palace-toolkit-dist
          path: dist

      - name: List package artifacts
        run: ls -lah dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
